<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Submit</title><link rel='stylesheet' href='../assets/style.css'></head><body><main class='wrap'>
<nav class='nav'><b>SG Application Insights</b><div class='menu'><a href='../index.html'>Dashboard</a><a href='cases.html'>Cases</a><a class='active' href='submit.html'>Submit</a><a href='insights.html'>Insights</a><a href='auth.html'>Auth</a><a href='admin.html'>Admin</a></div></nav>
<form class='card grid' id='fm'>
<div class='two'><div><label>Nickname</label><input name='nickname'></div><div><label>Application Type*</label><select name='application_type' required><option>PR</option><option>Citizen</option><option>LTVP</option></select></div></div>
<div class='two'><div><label>Nationality</label><input name='nationality'></div><div><label>Industry</label><input name='industry'></div></div>
<div class='two'><div><label>Income Band</label><input name='income_band' placeholder='e.g. 5k-8k'></div><div><label>Years in SG</label><input name='years_in_sg' type='number' step='0.1'></div></div>
<div class='two'><div><label>Application Date</label><input name='application_date' type='date'></div><div><label>Outcome Date</label><input name='outcome_date' type='date'></div></div>
<div class='two'><div><label>Outcome Status*</label><select name='outcome_status' required><option>pending</option><option>approved</option><option>rejected</option><option>appealed</option></select></div><div><label>Marital Status</label><input name='marital_status'></div></div>
<div><label>Free Text Notes</label><textarea name='free_text_notes' rows='4'></textarea></div>
<button>Submit Case</button><p class='small' id='msg'></p>
</form>
</main><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><script src='../js/config.js'></script><script src='../js/common.js'></script><script>
fm.onsubmit=async(e)=>{e.preventDefault();const fd=new FormData(fm);const o=Object.fromEntries(fd.entries());
if(o.application_date&&o.outcome_date&&new Date(o.outcome_date)<new Date(o.application_date)){msg.textContent='Outcome date cannot be earlier than application date';return}
for (const k in o){if(o[k]==='') o[k]=null}
o.family_application=false;o.children_count=0;o.moderation_status='pending_review';o.source_type='manual';
const {data:{user}}=await sb.auth.getUser(); o.user_id=user?.id||null;
const {error}=await sb.from('submissions').insert(o); msg.textContent=error?`Failed: ${error.message}`:'Submitted. It will be visible after moderation approval.'; if(!error) fm.reset();}
</script></body></html>
