<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Admin</title><link rel='stylesheet' href='../assets/style.css'></head><body><main class='wrap'>
<nav class='nav'><b>SG Application Insights</b><div class='menu'><a href='../index.html'>Dashboard</a><a href='cases.html'>Cases</a><a href='submit.html'>Submit</a><a href='insights.html'>Insights</a><a href='trends.html'>Trends</a><a href='auth.html'>Auth</a><a class='active' href='admin.html'>Admin</a></div></nav>
<div class='card'>
  <h3>Moderation Queue</h3>
  <p class='small'>Admin-only according to RLS. Batch update + moderation logs enabled.</p>
  <div class='row'>
    <button onclick="batchSet('approved')" style='max-width:160px'>Batch Approve</button>
    <button onclick="batchSet('rejected')" style='max-width:160px'>Batch Reject</button>
    <button onclick="batchSet('hidden')" style='max-width:160px'>Batch Hide</button>
  </div>
  <table class='table'><thead><tr><th><input type='checkbox' id='all'></th><th>ID</th><th>Type</th><th>Outcome</th><th>Moderation</th><th>Updated</th><th>Action</th></tr></thead><tbody id='tb'></tbody></table><p id='msg' class='small'></p>
</div>
</main><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><script src='../js/config.js'></script><script src='../js/common.js'></script><script>
let rows=[];
async function logAction(submission_id,action,reason){const {data:{user}}=await sb.auth.getUser(); if(!user) return; await sb.from('moderation_logs').insert({submission_id,moderator_id:user.id,action,reason})}
async function load(){const {data,error}=await sb.from('submissions').select('id,application_type,outcome_status,moderation_status,updated_at').order('updated_at',{ascending:false}).limit(100); if(error){msg.textContent=error.message;return}
rows=data||[];
tb.innerHTML=rows.map(x=>`<tr><td><input type='checkbox' class='pick' value='${x.id}'></td><td>${x.id.slice(0,8)}...</td><td>${x.application_type||'-'}</td><td>${x.outcome_status}</td><td>${x.moderation_status}</td><td>${fmtDate(x.updated_at)}</td><td><button onclick="setStatus('${x.id}','approved')">Approve</button> <button onclick="setStatus('${x.id}','rejected')">Reject</button> <button onclick="setStatus('${x.id}','hidden')">Hide</button></td></tr>`).join('')}
window.setStatus=async(id,to)=>{const {error}=await sb.from('submissions').update({moderation_status:to}).eq('id',id); if(error){msg.textContent=error.message;return} await logAction(id,to,'single update'); msg.textContent='Updated '+id.slice(0,8)+'... to '+to; load()}
window.batchSet=async(to)=>{const ids=[...document.querySelectorAll('.pick:checked')].map(x=>x.value); if(!ids.length){msg.textContent='No rows selected.'; return}
const {error}=await sb.from('submissions').update({moderation_status:to}).in('id',ids); if(error){msg.textContent=error.message; return}
for (const id of ids){ await logAction(id,to,'batch update') }
msg.textContent=`Batch updated ${ids.length} row(s) to ${to}`; load()}
all.onchange=()=>{document.querySelectorAll('.pick').forEach(x=>x.checked=all.checked)}
load();
</script></body></html>
