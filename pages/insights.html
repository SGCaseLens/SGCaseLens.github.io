<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="navInsights">我的分析</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo-sgcaselens-mark.svg">
  <link rel="shortcut icon" href="/assets/logo-sgcaselens-mark.svg">
  <meta name="description" content="根据您的条件查找相似PR、公民申请案例，对比通过/拒绝样本的画像与等待时长，获取数据洞察。">
  <meta name="keywords" content="相似案例,PR申请分析,公民申请对比,案例匹配,等待时长预测">
  <meta property="og:title" content="我的分析 - 新加坡申请案例洞察">
  <meta property="og:url" content="https://sgcaselens.github.io/pages/insights.html">
  <link rel="canonical" href="https://sgcaselens.github.io/pages/insights.html">
  <link rel="stylesheet" href="/assets/style.css">
  <script src="/js/theme.js"></script>
</head>
<body>
  <main class="wrap">
    <nav class="nav">
      <a class="brand" href="/index.html">
        <img src="/assets/logo-sgcaselens-mark.svg" alt="SGCaseLens logo">
        <span class="brand-text" data-i18n="siteName">新加坡申请案例洞察</span>
      </a>
      <div class="menu">
        <a href="/index.html" data-i18n="navDashboard">首页</a>
        <a href="/pages/cases.html" data-i18n="navCases">案例库</a>
        <a href="/pages/submit.html" data-i18n="navSubmit">提交案例</a>
        <a class="active" href="/pages/insights.html" data-i18n="navInsights">我的分析</a>
        <a href="/pages/trends.html" data-i18n="navTrends">趋势中心</a>
        <a href="/pages/my-cases.html" data-i18n="myCases">我的案例</a>
      </div>
      <span class="theme-switch">
        <a href="#" class="theme-opt" data-theme="light">Light</a>
        <span class="sep">|</span>
        <a href="#" class="theme-opt" data-theme="dark">Dark</a>
      </span>
      <span class="lang-switch">
        <a href="#" class="lang-opt" data-lang="zh" data-i18n="langZh">中文</a>
        <span class="sep">|</span>
        <a href="#" class="lang-opt" data-lang="en" data-i18n="langEn">English</a>
      </span>
    </nav>

    <div class="card two">
      <div>
        <label data-i18n="appType">申请类型</label>
        <select id="application_type">
          <option value="PR" data-i18n="optPR">PR</option>
          <option value="Citizen" data-i18n="optCitizen">公民</option>
          <option value="LTVP" data-i18n="optLTVP">LTVP</option>
        </select>
      </div>
      <div>
        <label data-i18n="industryLabel">行业</label>
        <select id="industry">
          <option value="" data-i18n="all">全部</option>
          <option value="Technology" data-i18n="optTechnology">Technology</option>
          <option value="Finance" data-i18n="optFinance">Finance</option>
          <option value="Healthcare" data-i18n="optHealthcare">Healthcare</option>
          <option value="Education" data-i18n="optEducation">Education</option>
          <option value="Manufacturing" data-i18n="optManufacturing">Manufacturing</option>
          <option value="Retail" data-i18n="optRetail">Retail</option>
          <option value="Consulting" data-i18n="optConsulting">Consulting</option>
          <option value="Logistics" data-i18n="optLogistics">Logistics</option>
          <option value="F&B" data-i18n="optFB">F&B</option>
          <option value="Media" data-i18n="optMedia">Media</option>
          <option value="Real Estate" data-i18n="optRealEstate">Real Estate</option>
          <option value="Construction" data-i18n="optConstruction">Construction</option>
          <option value="Government" data-i18n="optGovernment">Government</option>
          <option value="Other" data-i18n="optOther">Other</option>
        </select>
      </div>
    </div>
    <div class="card two">
      <div>
        <label data-i18n="incomeBandLabel">收入区间</label>
        <select id="income_band">
          <option value="" data-i18n="all">全部</option>
          <option value="2k-3k" data-i18n="opt2k3k">2k-3k</option>
          <option value="3k-5k" data-i18n="opt3k5k">3k-5k</option>
          <option value="5k-8k" data-i18n="opt5k8k">5k-8k</option>
          <option value="8k-12k" data-i18n="opt8k12k">8k-12k</option>
          <option value="12k-15k" data-i18n="opt12k15k">12k-15k</option>
          <option value="15k+" data-i18n="opt15k">15k+</option>
        </select>
      </div>
      <div>
        <label data-i18n="yearsInSg">在新年限</label>
        <select id="years_in_sg">
          <option value="" data-i18n="all">全部</option>
          <option value="0.5" data-i18n="optYearLT1">&lt;1 year</option>
          <option value="2" data-i18n="optYear13">1-3 years</option>
          <option value="4" data-i18n="optYear35">3-5 years</option>
          <option value="7" data-i18n="optYear510">5-10 years</option>
          <option value="12" data-i18n="optYear10">10+ years</option>
        </select>
      </div>
    </div>

    <div class="row">
      <button id="run" style="max-width:220px" data-i18n="runAnalysis">运行相似度分析</button>
      <button id="csv" style="max-width:220px" data-i18n="exportCsv">导出 CSV</button>
    </div>

    <div class="card">
      <p id="sum" class="small"><span id="sumText"></span><span id="sumTermsWrap" style="display:none"> · <a href="/pages/terms.html" data-i18n="termsLink" style="color:var(--brand)">查看条款和条件</a></span></p>
      <p id="scoreHint" class="small" style="display:none;margin-top:8px;color:var(--muted)" data-i18n="scoreHint"></p>
      <table class="table">
        <thead>
          <tr>
            <th data-i18n="score">分数</th>
            <th data-i18n="type">类型</th>
            <th data-i18n="industry">行业</th>
            <th data-i18n="outcome">结果</th>
            <th data-i18n="waiting">等待</th>
          </tr>
        </thead>
        <tbody id="tb"></tbody>
      </table>
      <div class="row">
        <button id="prev" style="max-width:120px" data-i18n="prev">上一页</button>
        <span id="pageInfo" class="small">Page 1</span>
        <button id="next" style="max-width:120px" data-i18n="next">下一页</button>
      </div>
    </div>

    <div class="two">
      <div class="card"><div id="radar" style="height:320px"></div></div>
      <div class="card"><div id="compare" style="height:320px"></div></div>
    </div>
  </main>

  <footer class="site-footer">
    <span data-i18n="copyright">© Copyright 2026. All rights reserved.</span>
    <span class="footer-sep">·</span>
    <a href="/pages/terms.html" data-i18n="termsLink">查看条款和条件</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5"></script>
  <script src="/js/config.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    document.querySelectorAll('.theme-opt').forEach((a) => {
      a.addEventListener('click', (e) => { e.preventDefault(); const t = a.getAttribute('data-theme'); if (theme && theme.getTheme() !== t) { theme.setTheme(t); document.querySelectorAll('.theme-opt').forEach(x => x.classList.toggle('active', x.getAttribute('data-theme') === t)); } });
    });
    document.querySelectorAll('.theme-opt').forEach((a) => a.classList.toggle('active', a.getAttribute('data-theme') === (theme?.getTheme() || 'dark')));
    document.querySelectorAll('.lang-opt').forEach((a) => {
      a.addEventListener('click', (e) => { e.preventDefault(); if (i18n.getLang() !== a.getAttribute('data-lang')) { i18n.setLang(a.getAttribute('data-lang')); location.reload(); } });
    });

    let all = [];
    let page = 1;
    let size = 10;
    let lastChartState = null;
    let radarChart = null;
    let compareChart = null;
    const elRun = document.getElementById('run');
    const elCsv = document.getElementById('csv');
    const elType = document.getElementById('application_type');
    const elIndustry = document.getElementById('industry');
    const elIncome = document.getElementById('income_band');
    const elYears = document.getElementById('years_in_sg');
    const elTb = document.getElementById('tb');
    const elPrev = document.getElementById('prev');
    const elNext = document.getElementById('next');
    const elPageInfo = document.getElementById('pageInfo');
    const elSumText = document.getElementById('sumText');
    const elSumTermsWrap = document.getElementById('sumTermsWrap');
    const elScoreHint = document.getElementById('scoreHint');

    function avg(xs, key) {
      const v = xs.map(x => x[key]).filter(n => n != null);
      return v.length ? v.reduce((a, b) => a + b, 0) / v.length : 0;
    }

    function renderTable() {
      const total = Math.max(1, Math.ceil(all.length / size));
      page = Math.max(1, Math.min(page, total));
      const start = (page - 1) * size;
      const items = all.slice(start, start + size);
      const esc = (v) => escapeHtml(String(v ?? '-'));
      elTb.innerHTML = items.map(x =>
        `<tr>
          <td>${escapeHtml(x.similarity_score)}</td>
          <td>${esc(tOpt(x.application_type) ?? x.application_type)}</td>
          <td>${esc(tOpt(x.industry) ?? x.industry)}</td>
          <td>${esc(tOpt(x.outcome_status) ?? x.outcome_status)}</td>
          <td>${escapeHtml(x.waiting_days ?? '-')}</td>
        </tr>`
      ).join('');
      elPageInfo.textContent = `${t('page')} ${page}/${total}`;
      elPrev.disabled = page <= 1;
      elNext.disabled = page >= total;
    }

    function downloadCSV(rows) {
      const head = ['similarity_score', 'application_type', 'industry', 'outcome_status', 'waiting_days'];
      const lines = [head.join(',')].concat(
        rows.map(r => head.map(k => `"${String(r[k] ?? '').replaceAll('"', '""')}"`).join(','))
      );
      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'similar_cases.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    elRun.onclick = async () => {
      const p = {
        p_application_type: elType.value,
        p_industry: elIndustry.value || null,
        p_income_band: elIncome.value || null,
        p_years_in_sg: elYears.value ? Number(elYears.value) : null,
        p_limit: 200
      };
      const { data, error } = await sb.rpc('find_similar_cases', p);
      if (error) { elSumText.textContent = 'Failed: ' + error.message; elSumTermsWrap.style.display = 'none'; return; }

      all = data || [];
      page = 1;
      renderTable();

      const approved = all.filter(x => x.outcome_status === 'approved');
      const rejected = all.filter(x => x.outcome_status === 'rejected');
      elSumText.textContent = t('insightSummary', { n: all.length, a: approved.length, r: rejected.length });
      elSumTermsWrap.style.display = 'inline';
      elScoreHint.style.display = 'block';

      const userYears = Number(elYears.value || 0);
      const userWaiting = avg(all, 'waiting_days');
      const userScore = avg(all, 'similarity_score');
      const aWaiting = avg(approved, 'waiting_days');
      const rWaiting = avg(rejected, 'waiting_days');
      lastChartState = { approved, rejected, userYears, userWaiting, userScore, aWaiting, rWaiting };

      const cc = theme?.getChartColors?.() || { text: '#e9eefc', muted: '#9fb0ce' };
      if (!radarChart) radarChart = echarts.init(document.getElementById('radar'));
      radarChart.setOption({
        title: { text: t('profileRadar'), textStyle: { color: cc.text }, top: 8, left: 'center' },
        legend: { data: [t('input'), t('approvedAvg'), t('rejectedAvg')], textStyle: { color: cc.muted }, top: 32, left: 'center' },
        radar: {
          center: ['50%', '58%'],
          radius: '52%',
          indicator: [
            { name: t('yearsInSgAxis'), max: 15 },
            { name: t('waitingDaysAxis'), max: 500 },
            { name: t('similarityAxis'), max: 100 }
          ],
          axisName: { color: cc.muted }
        },
        series: [{
          type: 'radar',
          data: [
            { name: t('input'), value: [userYears, userWaiting, userScore] },
            { name: t('approvedAvg'), value: [userYears, aWaiting, 70] },
            { name: t('rejectedAvg'), value: [userYears, rWaiting, 50] }
          ]
        }]
      });

      if (!compareChart) compareChart = echarts.init(document.getElementById('compare'));
      compareChart.setOption({
        title: { text: t('approvedVsRejected'), textStyle: { color: cc.text }, top: 8, left: 'center' },
        legend: { data: [t('approved'), t('rejected')], textStyle: { color: cc.muted }, top: 32, left: 'center' },
        xAxis: { type: 'category', data: [t('count'), t('avgWaitDays')], axisLabel: { color: cc.muted } },
        yAxis: { type: 'value', axisLabel: { color: cc.muted } },
        series: [
          { name: t('approved'), type: 'bar', data: [approved.length, Math.round(aWaiting)] },
          { name: t('rejected'), type: 'bar', data: [rejected.length, Math.round(rWaiting)] }
        ],
        grid: { left: 40, right: 10, top: 70, bottom: 40 }
      });
    };

    function redrawCharts() {
      if (!lastChartState) return;
      const { approved, rejected, userYears, userWaiting, userScore, aWaiting, rWaiting } = lastChartState;
      const cc = theme?.getChartColors?.() || { text: '#e9eefc', muted: '#9fb0ce' };
      if (!radarChart) radarChart = echarts.init(document.getElementById('radar'));
      radarChart.setOption({
        title: { text: t('profileRadar'), textStyle: { color: cc.text }, top: 8, left: 'center' },
        legend: { data: [t('input'), t('approvedAvg'), t('rejectedAvg')], textStyle: { color: cc.muted }, top: 32, left: 'center' },
        radar: {
          center: ['50%', '58%'],
          radius: '52%',
          indicator: [
            { name: t('yearsInSgAxis'), max: 15 },
            { name: t('waitingDaysAxis'), max: 500 },
            { name: t('similarityAxis'), max: 100 }
          ],
          axisName: { color: cc.muted }
        },
        series: [{
          type: 'radar',
          data: [
            { name: t('input'), value: [userYears, userWaiting, userScore] },
            { name: t('approvedAvg'), value: [userYears, aWaiting, 70] },
            { name: t('rejectedAvg'), value: [userYears, rWaiting, 50] }
          ]
        }]
      });
      if (!compareChart) compareChart = echarts.init(document.getElementById('compare'));
      compareChart.setOption({
        title: { text: t('approvedVsRejected'), textStyle: { color: cc.text }, top: 8, left: 'center' },
        legend: { data: [t('approved'), t('rejected')], textStyle: { color: cc.muted }, top: 32, left: 'center' },
        xAxis: { type: 'category', data: [t('count'), t('avgWaitDays')], axisLabel: { color: cc.muted } },
        yAxis: { type: 'value', axisLabel: { color: cc.muted } },
        series: [
          { name: t('approved'), type: 'bar', data: [approved.length, Math.round(aWaiting)] },
          { name: t('rejected'), type: 'bar', data: [rejected.length, Math.round(rWaiting)] }
        ],
        grid: { left: 40, right: 10, top: 70, bottom: 40 }
      });
    }

    document.addEventListener('themechange', redrawCharts);

    elPrev.onclick = () => { page--; renderTable(); };
    elNext.onclick = () => { page++; renderTable(); };
    elCsv.onclick = () => downloadCSV(all);
  </script>
</body>
</html>
