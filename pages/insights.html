<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Insights</title><link rel='stylesheet' href='../assets/style.css'></head><body><main class='wrap'>
<nav class='nav'><b>SG Application Insights</b><div class='menu'><a href='../index.html'>Dashboard</a><a href='cases.html'>Cases</a><a href='submit.html'>Submit</a><a class='active' href='insights.html'>Insights</a><a href='trends.html'>Trends</a><a href='auth.html'>Auth</a><a href='admin.html'>Admin</a></div></nav>
<div class='card two'><div><label>Application Type</label><select id='application_type'><option>PR</option><option>Citizen</option><option>LTVP</option></select></div><div><label>Industry</label><input id='industry'></div></div>
<div class='card two'><div><label>Income Band</label><input id='income_band'></div><div><label>Years in SG</label><input id='years_in_sg' type='number' step='0.1'></div></div>
<button id='run'>Run Similarity Analysis</button>
<div class='card'><p id='sum' class='small'></p><table class='table'><thead><tr><th>Score</th><th>Type</th><th>Industry</th><th>Outcome</th><th>Waiting</th></tr></thead><tbody id='tb'></tbody></table></div>
</main><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><script src='../js/config.js'></script><script src='../js/common.js'></script><script>
run.onclick=async()=>{const p={p_application_type:application_type.value,p_industry:industry.value||null,p_income_band:income_band.value||null,p_years_in_sg:years_in_sg.value?Number(years_in_sg.value):null,p_limit:30};
const {data,error}=await sb.rpc('find_similar_cases',p); if(error){sum.textContent='Failed: '+error.message; return}
const arr=data||[]; tb.innerHTML=arr.map(x=>`<tr><td>${x.similarity_score}</td><td>${x.application_type||'-'}</td><td>${x.industry||'-'}</td><td>${x.outcome_status||'-'}</td><td>${x.waiting_days??'-'}</td></tr>`).join('');
const approved=arr.filter(x=>x.outcome_status==='approved').length; const rejected=arr.filter(x=>x.outcome_status==='rejected').length;
sum.textContent=`Based on platform samples: ${arr.length} similar cases found. In similar samples, approved=${approved}, rejected=${rejected}. Trend indicates descriptive reference only.`}
</script></body></html>
