<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Cases</title><link rel='stylesheet' href='../assets/style.css'></head><body><main class='wrap'>
<nav class='nav'><b>SG Application Insights</b><div class='menu'><a href='../index.html'>Dashboard</a><a class='active' href='cases.html'>Cases</a><a href='submit.html'>Submit</a><a href='insights.html'>Insights</a><a href='trends.html'>Trends</a><a href='auth.html'>Auth</a><a href='admin.html'>Admin</a></div></nav>
<div class='card two'>
  <div><label>Application Type</label><select id='fType'><option value=''>All</option><option>PR</option><option>Citizen</option><option>LTVP</option></select></div>
  <div><label>Outcome</label><select id='fOut'><option value=''>All</option><option>approved</option><option>rejected</option><option>pending</option><option>appealed</option></select></div>
</div>
<div class='card row'>
  <button id='saveFilter' style='max-width:200px'>Save Filter</button>
  <button id='copyLink' style='max-width:220px'>Copy Share Link</button>
  <span id='meta' class='small'></span>
</div>
<div class='card'><table class='table'><thead><tr><th>Type</th><th>Outcome</th><th>Industry</th><th>Income</th><th>Applied</th><th>Outcome Date</th><th>Waiting</th></tr></thead><tbody id='tb'></tbody></table></div>
</main><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><script src='../js/config.js'></script><script src='../js/common.js'></script><script>
let all=[]; const tb=document.getElementById('tb');
function applyQuery(){const u=new URL(location.href);fType.value=u.searchParams.get('type')||'';fOut.value=u.searchParams.get('out')||''}
function syncQuery(){const u=new URL(location.href); if(fType.value)u.searchParams.set('type',fType.value); else u.searchParams.delete('type'); if(fOut.value)u.searchParams.set('out',fOut.value); else u.searchParams.delete('out'); history.replaceState({},'',u)}
function render(){const t=fType.value,o=fOut.value;const x=all.filter(r=>(!t||r.application_type===t)&&(!o||r.outcome_status===o));tb.innerHTML=x.map(r=>`<tr><td>${r.application_type||'-'}</td><td>${r.outcome_status||'-'}</td><td>${r.industry||'-'}</td><td>${r.income_band||'-'}</td><td>${fmtDate(r.application_date)}</td><td>${fmtDate(r.outcome_date)}</td><td>${r.waiting_days??'-'}</td></tr>`).join('');meta.textContent=`${x.length} result(s)`; syncQuery()}
(async()=>{applyQuery();const {data,error}=await sb.from('public_cases_view').select('application_type,outcome_status,industry,income_band,application_date,outcome_date,waiting_days,created_at').order('created_at',{ascending:false}).limit(500); if(error){alert(error.message);return;} all=data||[]; render();})();
fType.onchange=fOut.onchange=render;
copyLink.onclick=async()=>{await navigator.clipboard.writeText(location.href);meta.textContent='Share link copied.'}
saveFilter.onclick=async()=>{const {data:{user}}=await sb.auth.getUser(); if(!user){meta.textContent='Login required to save filters.';return}
const payload={user_id:user.id,name:`${fType.value||'All'}-${fOut.value||'All'}`,filter_json:{type:fType.value||null,out:fOut.value||null}};
const {error}=await sb.from('saved_filters').insert(payload); meta.textContent=error?error.message:'Filter saved.';}
</script></body></html>
