<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Cases</title><link rel='stylesheet' href='../assets/style.css'></head><body><main class='wrap'>
<nav class='nav'><b>SG Application Insights</b><div class='menu'><a href='../index.html'>Dashboard</a><a class='active' href='cases.html'>Cases</a><a href='submit.html'>Submit</a><a href='insights.html'>Insights</a><a href='trends.html'>Trends</a><a href='auth.html'>Auth</a><a href='admin.html'>Admin</a></div></nav>
<div class='card two'>
  <div><label>Application Type</label><select id='fType'><option value=''>All</option><option>PR</option><option>Citizen</option><option>LTVP</option></select></div>
  <div><label>Outcome</label><select id='fOut'><option value=''>All</option><option>approved</option><option>rejected</option><option>pending</option><option>appealed</option></select></div>
</div>
<div class='card row'>
  <select id='pageSize' style='max-width:140px'><option value='10'>10 / page</option><option value='20' selected>20 / page</option><option value='50'>50 / page</option></select>
  <select id='viewMode' style='max-width:160px'><option value='table' selected>Table View</option><option value='card'>Card View</option></select>
  <button id='saveFilter' style='max-width:180px'>Save Filter</button>
  <select id='savedList' style='max-width:260px'><option value=''>Load Saved Filter...</option></select>
  <button id='copyLink' style='max-width:180px'>Copy Share Link</button>
  <span id='meta' class='small'></span>
</div>
<div id='tableWrap' class='card'><table class='table'><thead><tr><th>Type</th><th>Outcome</th><th>Industry</th><th>Income</th><th>Applied</th><th>Outcome Date</th><th>Waiting</th><th>Action</th></tr></thead><tbody id='tb'></tbody></table></div>
<div id='cardWrap' class='grid' style='display:none'></div>
<div class='card row'><button id='prev' style='max-width:120px'>Prev</button><span id='pageInfo' class='small'>Page 1</span><button id='next' style='max-width:120px'>Next</button></div>

<dialog id='detailDlg' style='max-width:680px;width:90%;background:#0f172a;color:#e9eefc;border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:16px'>
  <h3>Case Details</h3>
  <pre id='detailText' style='white-space:pre-wrap;line-height:1.6'></pre>
  <button onclick='detailDlg.close()'>Close</button>
</dialog>

</main><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><script src='../js/config.js'></script><script src='../js/common.js'></script><script>
let all=[], currentPage=1, size=20; const tb=document.getElementById('tb'); const cardWrap=document.getElementById('cardWrap');
function applyQuery(){const u=new URL(location.href);fType.value=u.searchParams.get('type')||'';fOut.value=u.searchParams.get('out')||'';currentPage=Number(u.searchParams.get('p')||1);size=Number(u.searchParams.get('s')||20);pageSize.value=String(size);viewMode.value=u.searchParams.get('v')||'table'}
function syncQuery(){const u=new URL(location.href); if(fType.value)u.searchParams.set('type',fType.value); else u.searchParams.delete('type'); if(fOut.value)u.searchParams.set('out',fOut.value); else u.searchParams.delete('out'); u.searchParams.set('p',String(currentPage)); u.searchParams.set('s',String(size)); u.searchParams.set('v',viewMode.value); history.replaceState({},'',u)}
function filtered(){const t=fType.value,o=fOut.value;return all.filter(r=>(!t||r.application_type===t)&&(!o||r.outcome_status===o))}
function openDetail(r){detailText.textContent=JSON.stringify(r,null,2); detailDlg.showModal()}
function renderCards(pageItems){cardWrap.innerHTML=pageItems.map((r,idx)=>`<article class='card'><h3>${r.application_type||'-'} · ${r.outcome_status||'-'}</h3><p class='small'>Industry: ${r.industry||'-'} · Income: ${r.income_band||'-'}</p><p class='small'>Applied: ${fmtDate(r.application_date)} · Outcome: ${fmtDate(r.outcome_date)} · Waiting: ${r.waiting_days??'-'} days</p><button onclick='openDetailByIndex(${idx})'>Details</button></article>`).join(''); window._pageItems=pageItems}
window.openDetailByIndex=(i)=>openDetail((window._pageItems||[])[i]);
function render(){const x=filtered(); const totalPages=Math.max(1,Math.ceil(x.length/size)); currentPage=Math.max(1,Math.min(currentPage,totalPages)); const start=(currentPage-1)*size; const pageItems=x.slice(start,start+size);
tb.innerHTML=pageItems.map((r,idx)=>`<tr><td>${r.application_type||'-'}</td><td>${r.outcome_status||'-'}</td><td>${r.industry||'-'}</td><td>${r.income_band||'-'}</td><td>${fmtDate(r.application_date)}</td><td>${fmtDate(r.outcome_date)}</td><td>${r.waiting_days??'-'}</td><td><button onclick='openDetailByIndex(${idx})'>Details</button></td></tr>`).join('');
renderCards(pageItems);
const card=viewMode.value==='card'; tableWrap.style.display=card?'none':'block'; cardWrap.style.display=card?'grid':'none';
meta.textContent=`${x.length} result(s)`; pageInfo.textContent=`Page ${currentPage}/${totalPages}`; prev.disabled=currentPage<=1; next.disabled=currentPage>=totalPages; syncQuery()}
async function loadSavedFilters(){const {data:{user}}=await sb.auth.getUser(); if(!user) return; const {data}=await sb.from('saved_filters').select('id,name,filter_json').eq('user_id',user.id).order('created_at',{ascending:false}).limit(30); const arr=data||[]; savedList.innerHTML="<option value=''>Load Saved Filter...</option>"+arr.map(x=>`<option value='${x.id}'>${x.name}</option>`).join(''); window._saved=arr}
(async()=>{applyQuery();const {data,error}=await sb.from('public_cases_with_tags_view').select('*').order('created_at',{ascending:false}).limit(1000); if(error){alert(error.message);return;} all=data||[]; render(); loadSavedFilters();})();
fType.onchange=fOut.onchange=()=>{currentPage=1;render()}; pageSize.onchange=()=>{size=Number(pageSize.value)||20; currentPage=1; render()}; viewMode.onchange=render; prev.onclick=()=>{currentPage--;render()}; next.onclick=()=>{currentPage++;render()};
copyLink.onclick=async()=>{await navigator.clipboard.writeText(location.href);meta.textContent='Share link copied.'}
saveFilter.onclick=async()=>{const {data:{user}}=await sb.auth.getUser(); if(!user){meta.textContent='Login required to save filters.';return}
const payload={user_id:user.id,name:`${fType.value||'All'}-${fOut.value||'All'}-${new Date().toISOString().slice(0,10)}`,filter_json:{type:fType.value||null,out:fOut.value||null,size,page:currentPage,view:viewMode.value}};
const {error}=await sb.from('saved_filters').insert(payload); meta.textContent=error?error.message:'Filter saved.'; if(!error) loadSavedFilters();}
savedList.onchange=()=>{const it=(window._saved||[]).find(x=>x.id===savedList.value); if(!it) return; const f=it.filter_json||{}; fType.value=f.type||''; fOut.value=f.out||''; size=Number(f.size||20); pageSize.value=String(size); currentPage=Number(f.page||1); viewMode.value=f.view||'table'; render(); meta.textContent='Saved filter loaded.'}
</script></body></html>
